<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video to Spritesheet - 视频转雪碧图</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js">
</script>
<script>
// Fallback if CDN fails
if (typeof JSZip === 'undefined') {
  document.write('<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"><\/script>');
}
</script>
<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --border: #2a2a3e;
  --text: #cdd6f4;
  --dim: #6c7086;
  --accent: #cba6f7;
  --gold: #f5c2e7;
  --green: #a6e3a1;
  --red: #f38ba8;
  --blue: #89b4fa;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
}

.header {
  text-align: center;
  padding: 28px 16px 12px;
}
.header h1 { font-size: 1.8rem; color: var(--gold); }
.header p  { font-size: 0.9rem; color: var(--dim); margin-top: 4px; }

.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 0 16px 40px;
}

/* Drop zone */
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: 16px;
  padding: 48px 24px;
  text-align: center;
  transition: all 0.2s;
  cursor: pointer;
  background: var(--surface);
  margin-bottom: 16px;
}
.drop-zone.drag-over {
  border-color: var(--accent);
  background: #1e1e38;
}
.drop-zone .icon { font-size: 3rem; margin-bottom: 8px; }
.drop-zone .main-text { font-size: 1.1rem; }
.drop-zone .sub-text { font-size: 0.85rem; color: var(--dim); margin-top: 4px; }
.drop-zone input[type=file] { display: none; }

/* Panels */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 14px;
  overflow: hidden;
}
.panel-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  font-size: 0.95rem;
  color: var(--blue);
}
.panel-body { padding: 16px; }

/* Video info */
.video-info {
  display: none;
  gap: 16px;
  flex-wrap: wrap;
}
.video-info.show { display: flex; }
.info-chip {
  background: #1e1e38;
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 0.85rem;
  color: var(--dim);
}
.info-chip span { color: var(--text); font-weight: 500; }

/* Preview */
.preview-area {
  text-align: center;
  min-height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #080812;
  border-radius: 8px;
  position: relative;
}
.preview-area canvas {
  max-width: 100%;
  max-height: 400px;
  border-radius: 4px;
}
.preview-placeholder {
  color: var(--dim);
  font-size: 0.9rem;
}

/* Slider */
.slider-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 12px;
}
.slider-row input[type=range] {
  flex: 1;
  accent-color: var(--accent);
}
.slider-row .time-label {
  font-size: 0.85rem;
  color: var(--dim);
  min-width: 80px;
  text-align: center;
}
.nav-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  padding: 6px 12px;
  cursor: pointer;
  font-size: 0.85rem;
  transition: background 0.15s;
}
.nav-btn:hover { background: #2a2a3e; }

/* Settings grid */
.settings-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 14px;
}
.setting label {
  display: block;
  font-size: 0.8rem;
  color: var(--dim);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.setting input {
  width: 100%;
  padding: 8px 12px;
  background: #0f0f1a;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.95rem;
}
.setting input:focus {
  outline: none;
  border-color: var(--accent);
}
.setting .unit {
  font-size: 0.75rem;
  color: var(--dim);
  margin-top: 2px;
}

/* Buttons */
.btn-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 16px;
}
.btn {
  padding: 12px 24px;
  border: none;
  border-radius: 10px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.btn-primary {
  background: var(--accent);
  color: #0f0f1a;
}
.btn-primary:hover:not(:disabled) { filter: brightness(1.1); }
.btn-outline {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
}
.btn-outline:hover:not(:disabled) { background: #2a2a3e; }
.btn-success {
  background: var(--green);
  color: #0f0f1a;
}
.btn-success:hover:not(:disabled) { filter: brightness(1.1); }

/* Progress */
.progress-wrap {
  display: none;
  margin-top: 12px;
}
.progress-wrap.show { display: block; }
.progress-bar {
  height: 6px;
  background: #2a2a3e;
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.1s;
  width: 0%;
}
.progress-text {
  text-align: center;
  font-size: 0.8rem;
  color: var(--dim);
  margin-top: 6px;
}

/* Spritesheet result */
.result-section {
  display: none;
  margin-top: 16px;
}
.result-section.show { display: block; }
.result-section h3 {
  color: var(--green);
  margin-bottom: 10px;
  font-size: 1rem;
}
.result-section canvas {
  max-width: 100%;
  border-radius: 8px;
  border: 1px solid var(--border);
  image-rendering: pixelated;
}
.result-stats {
  font-size: 0.85rem;
  color: var(--dim);
  margin-bottom: 10px;
}
.download-btns {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 12px;
}

footer {
  text-align: center;
  padding: 20px;
  color: var(--dim);
  font-size: 0.8rem;
}

/* Responsive */
@media (max-width: 640px) {
  .header h1 { font-size: 1.3rem; }
  .settings-grid { grid-template-columns: 1fr 1fr; }
  .btn-row { flex-direction: column; }
  .btn { width: 100%; text-align: center; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🎬 Video → Spritesheet</h1>
  <p>视频转雪碧图 · 纯浏览器处理 · 不上传任何数据</p>
</div>

<div class="container">

  <!-- Drop zone -->
  <div class="drop-zone" id="dropZone">
    <div class="icon">📁</div>
    <div class="main-text">拖拽视频到这里，或点击选择文件</div>
    <div class="sub-text">支持 MP4 / WebM / MOV / AVI · 文件不会上传，全部本地处理</div>
    <input type="file" id="fileInput" accept="video/*">
  </div>

  <!-- Video info -->
  <div class="video-info" id="videoInfo">
    <div class="info-chip">分辨率 <span id="infoRes">-</span></div>
    <div class="info-chip">时长 <span id="infoDur">-</span></div>
    <div class="info-chip">帧率 <span id="infoFps">-</span></div>
  </div>

  <!-- Preview -->
  <div class="panel" id="previewPanel" style="display:none">
    <div class="panel-header">📺 预览</div>
    <div class="panel-body">
      <div class="preview-area" id="previewArea">
        <canvas id="previewCanvas"></canvas>
        <div class="preview-placeholder" id="previewPlaceholder">加载视频后可预览</div>
      </div>
      <div class="slider-row">
        <button class="nav-btn" id="btnPrevFrame" title="上一帧">◀</button>
        <button class="nav-btn" id="btnPrevSec" title="后退1秒">⏪</button>
        <input type="range" id="timeSlider" min="0" max="1000" value="0" step="1">
        <button class="nav-btn" id="btnNextSec" title="前进1秒">⏩</button>
        <button class="nav-btn" id="btnNextFrame" title="下一帧">▶</button>
        <span class="time-label" id="timeLabel">00:00.000</span>
      </div>
    </div>
  </div>

  <!-- Settings -->
  <div class="panel" id="settingsPanel" style="display:none">
    <div class="panel-header">⚙ 导出设置</div>
    <div class="panel-body">
      <div class="settings-grid">
        <div class="setting">
          <label>开始时间 (秒)</label>
          <input type="number" id="startTime" value="0" min="0" step="0.01">
        </div>
        <div class="setting">
          <label>结束时间 (秒)</label>
          <input type="number" id="endTime" value="1" min="0" step="0.01">
        </div>
        <div class="setting">
          <label>帧间隔 (秒)</label>
          <input type="number" id="stepTime" value="0.1" min="0.01" step="0.01">
          <div class="unit">0.1s = 10fps, 0.05s = 20fps, 0.033s ≈ 30fps</div>
        </div>
        <div class="setting">
          <label>雪碧图列数</label>
          <input type="number" id="columns" value="8" min="1" max="50" step="1">
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" id="btnExtract">🎯 提取帧并生成雪碧图</button>
        <button class="btn btn-outline" id="btnSetRange">📎 使用当前预览时间作为范围</button>
      </div>

      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">准备中...</div>
      </div>
    </div>
  </div>

  <!-- Result -->
  <div class="result-section" id="resultSection">
    <h3>✅ 雪碧图生成完成</h3>
    <div class="result-stats" id="resultStats"></div>
    <canvas id="resultCanvas"></canvas>
    <div class="download-btns">
      <button class="btn btn-success" id="btnDownloadSheet">📋 下载雪碧图 (PNG)</button>
      <button class="btn btn-outline" id="btnDownloadZip">📦 下载全部帧 (ZIP)</button>
    </div>
  </div>

</div>

<footer>🔒 所有处理均在本地浏览器完成，视频不会被上传到任何服务器</footer>

<video id="videoEl" style="display:none" preload="auto" crossorigin="anonymous"></video>

<script>
// ============================================================
//  Video to Spritesheet Web App
// ============================================================

const $ = (s) => document.querySelector(s);

const videoEl    = $('#videoEl');
const dropZone   = $('#dropZone');
const fileInput  = $('#fileInput');
const videoInfo  = $('#videoInfo');
const previewPanel = $('#previewPanel');
const settingsPanel = $('#settingsPanel');
const previewCanvas = $('#previewCanvas');
const timeSlider   = $('#timeSlider');
const timeLabel    = $('#timeLabel');
const previewPlaceholder = $('#previewPlaceholder');
const progressWrap  = $('#progressWrap');
const progressFill  = $('#progressFill');
const progressText  = $('#progressText');
const resultSection = $('#resultSection');
const resultCanvas  = $('#resultCanvas');
const resultStats   = $('#resultStats');

let videoLoaded = false;
let videoDuration = 0;
let estimatedFps = 30;
let isSeeking = false;
let extractedFrames = [];  // { dataURL, width, height }

// ---- File handling ----
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  if (e.target.files.length) loadVideo(e.target.files[0]);
});

dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('drag-over');
});
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('video/')) {
    loadVideo(file);
  }
});

function loadVideo(file) {
  // Reset
  videoLoaded = false;
  extractedFrames = [];
  resultSection.classList.remove('show');
  progressWrap.classList.remove('show');

  const url = URL.createObjectURL(file);
  videoEl.src = url;
  videoEl.load();

  videoEl.onloadedmetadata = () => {
    videoDuration = videoEl.duration;
    estimatedFps = estimateFps();
    videoLoaded = true;

    // Update UI
    videoInfo.classList.add('show');
    previewPanel.style.display = '';
    settingsPanel.style.display = '';
    $('#previewPlaceholder').style.display = 'none';
    $('#infoRes').textContent = `${videoEl.videoWidth}×${videoEl.videoHeight}`;
    $('#infoDur').textContent = formatTime(videoDuration);
    $('#infoFps').textContent = `~${estimatedFps} fps`;

    timeSlider.max = Math.floor(videoDuration * 1000);
    timeSlider.value = 0;
    $('#endTime').value = videoDuration.toFixed(2);
    updateTimeLabel(0);
    seekAndShow(0);
  };

  videoEl.onerror = () => {
    alert('无法加载此视频。\n\n可能原因:\n- 浏览器不支持该视频编码\n- 请使用 H.264 MP4 或 WebM 格式');
    URL.revokeObjectURL(url);
  };
}

function estimateFps() {
  // Try to get fps from video track
  if (videoEl.captureStream) {
    try {
      const track = videoEl.captureStream().getVideoTracks()[0];
      if (track && track.getSettings && track.getSettings().frameRate) {
        return Math.round(track.getSettings().frameRate);
      }
    } catch(e) {}
  }
  // Fallback: estimate from WebKit / Gecko APIs
  if (videoEl.webkitDecodedFrameCount && videoEl.currentTime > 0) {
    // rough estimate
  }
  return 30; // default
}

// ---- Time / slider ----
function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  const ms = Math.floor((seconds % 1) * 1000);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms).padStart(3,'0')}`;
}

function updateTimeLabel(t) {
  timeLabel.textContent = formatTime(t);
}

timeSlider.addEventListener('input', () => {
  const t = timeSlider.value / 1000;
  updateTimeLabel(t);
});
timeSlider.addEventListener('change', () => {
  const t = timeSlider.value / 1000;
  seekAndShow(t);
});

// ---- Seek and capture ----
function seekAndShow(targetTime) {
  if (!videoLoaded || isSeeking) return;
  isSeeking = true;
  targetTime = Math.max(0, Math.min(targetTime, videoDuration));

  let resolved = false;
  const onSeeked = () => {
    if (resolved) return;
    resolved = true;
    videoEl.removeEventListener('seeked', onSeeked);
    isSeeking = false;
    capturePreview();
  };

  videoEl.addEventListener('seeked', onSeeked);
  videoEl.currentTime = targetTime;

  // Fallback timeout
  setTimeout(() => {
    if (!resolved) {
      resolved = true;
      videoEl.removeEventListener('seeked', onSeeked);
      isSeeking = false;
      capturePreview();
    }
  }, 3000);
}

function capturePreview() {
  const vw = videoEl.videoWidth || 320;
  const vh = videoEl.videoHeight || 240;
  previewCanvas.width = vw;
  previewCanvas.height = vh;
  const ctx = previewCanvas.getContext('2d');
  ctx.drawImage(videoEl, 0, 0, vw, vh);

  const t = videoEl.currentTime;
  timeSlider.value = Math.floor(t * 1000);
  updateTimeLabel(t);
}

// ---- Navigation buttons ----
$('#btnPrevFrame').addEventListener('click', () => {
  const t = Math.max(0, videoEl.currentTime - 1/estimatedFps);
  seekAndShow(t);
});
$('#btnPrevSec').addEventListener('click', () => {
  const t = Math.max(0, videoEl.currentTime - 1);
  seekAndShow(t);
});
$('#btnNextSec').addEventListener('click', () => {
  const t = Math.min(videoDuration, videoEl.currentTime + 1);
  seekAndShow(t);
});
$('#btnNextFrame').addEventListener('click', () => {
  const t = Math.min(videoDuration, videoEl.currentTime + 1/estimatedFps);
  seekAndShow(t);
});

// ---- Set range from preview ----
$('#btnSetRange').addEventListener('click', () => {
  const t = videoEl.currentTime;
  $('#startTime').value = Math.max(0, t - 0.5).toFixed(2);
  $('#endTime').value = Math.min(videoDuration, t + 0.5).toFixed(2);
});

// ---- Extract frames ----
$('#btnExtract').addEventListener('click', async () => {
  if (!videoLoaded) return;
  const start = parseFloat($('#startTime').value) || 0;
  const end   = parseFloat($('#endTime').value) || videoDuration;
  const step  = parseFloat($('#stepTime').value) || 0.1;
  const cols  = parseInt($('#columns').value) || 8;

  if (start >= end) { alert('开始时间必须小于结束时间'); return; }
  if (step <= 0)     { alert('帧间隔必须大于0'); return; }

  // Disable button
  const btn = $('#btnExtract');
  btn.disabled = true;
  btn.textContent = '提取中...';

  progressWrap.classList.add('show');
  progressFill.style.width = '0%';
  progressText.textContent = '正在提取帧...';

  extractedFrames = [];
  const times = [];
  for (let t = start; t <= end + step/2; t += step) {
    if (t > videoDuration) break;
    times.push(Math.min(t, videoDuration));
  }
  const total = times.length;

  resultSection.classList.remove('show');

  for (let i = 0; i < total; i++) {
    const t = times[i];
    const dataURL = await seekAndCapture(t);
    if (dataURL) {
      extractedFrames.push({
        dataURL,
        width: videoEl.videoWidth,
        height: videoEl.videoHeight,
        time: t,
      });
    }

    const pct = Math.round((i + 1) / total * 100);
    progressFill.style.width = pct + '%';
    progressText.textContent = `提取帧: ${i + 1} / ${total}`;
  }

  // Generate spritesheet
  if (extractedFrames.length === 0) {
    progressText.textContent = '错误: 没有提取到任何帧';
    btn.disabled = false;
    btn.textContent = '🎯 提取帧并生成雪碧图';
    return;
  }

  progressText.textContent = '正在生成雪碧图...';

  const sheetDataURL = await makeSpritesheet(extractedFrames, cols);

  // Show result
  const img = new Image();
  img.onload = () => {
    resultCanvas.width = img.width;
    resultCanvas.height = img.height;
    const ctx = resultCanvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
  };
  img.src = sheetDataURL;

  resultSection.classList.add('show');
  resultStats.textContent = `${extractedFrames.length} 帧 · ${cols} 列 · ${videoEl.videoWidth}×${videoEl.videoHeight}`;

  // Store for download
  resultCanvas._sheetDataURL = sheetDataURL;

  progressFill.style.width = '100%';
  progressText.textContent = `✅ 完成! 共提取 ${extractedFrames.length} 帧`;

  btn.disabled = false;
  btn.textContent = '🎯 提取帧并生成雪碧图';
});

function seekAndCapture(targetTime) {
  return new Promise((resolve) => {
    let resolved = false;
    const onSeeked = () => {
      if (resolved) return;
      resolved = true;
      videoEl.removeEventListener('seeked', onSeeked);
      const vw = videoEl.videoWidth || 320;
      const vh = videoEl.videoHeight || 240;
      const offCanvas = document.createElement('canvas');
      offCanvas.width = vw;
      offCanvas.height = vh;
      const ctx = offCanvas.getContext('2d');
      ctx.drawImage(videoEl, 0, 0, vw, vh);
      resolve(offCanvas.toDataURL('image/png'));
    };

    videoEl.addEventListener('seeked', onSeeked);
    videoEl.currentTime = targetTime;

    setTimeout(() => {
      if (!resolved) {
        resolved = true;
        videoEl.removeEventListener('seeked', onSeeked);
        // Still try to draw whatever is shown
        const vw = videoEl.videoWidth || 320;
        const vh = videoEl.videoHeight || 240;
        const offCanvas = document.createElement('canvas');
        offCanvas.width = vw;
        offCanvas.height = vh;
        const ctx = offCanvas.getContext('2d');
        ctx.drawImage(videoEl, 0, 0, vw, vh);
        resolve(offCanvas.toDataURL('image/png'));
      }
    }, 4000);
  });
}

// ---- Spritesheet generation ----
async function makeSpritesheet(frames, cols) {
  const gap = 2;
  const fw = frames[0].width;
  const fh = frames[0].height;
  const rows = Math.ceil(frames.length / cols);

  const sheetW = cols * fw + (cols + 1) * gap;
  const sheetH = rows * fh + (rows + 1) * gap;

  const canvas = document.createElement('canvas');
  canvas.width = sheetW;
  canvas.height = sheetH;
  const ctx = canvas.getContext('2d');

  // Load all images first
  const images = await Promise.all(frames.map(f => {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = f.dataURL;
    });
  }));

  images.forEach((img, i) => {
    if (!img) return;
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = gap + col * (fw + gap);
    const y = gap + row * (fh + gap);
    ctx.drawImage(img, x, y, fw, fh);
  });

  return canvas.toDataURL('image/png');
}

// ---- Download ----
$('#btnDownloadSheet').addEventListener('click', () => {
  const dataURL = resultCanvas._sheetDataURL;
  if (!dataURL) return;
  downloadDataURL(dataURL, 'spritesheet.png');
});

$('#btnDownloadZip').addEventListener('click', async () => {
  if (!extractedFrames.length) return;

  const zip = new JSZip();
  const folder = zip.folder('frames');

  extractedFrames.forEach((frame, i) => {
    // Strip data URL prefix
    const base64 = frame.dataURL.split(',')[1];
    const fname = `frame_${String(i).padStart(5, '0')}.png`;
    folder.file(fname, base64, { base64: true });
  });

  const btn = $('#btnDownloadZip');
  btn.disabled = true;
  btn.textContent = '打包中...';

  const blob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'frames.zip';
  a.click();
  URL.revokeObjectURL(url);

  btn.disabled = false;
  btn.textContent = '📦 下载全部帧 (ZIP)';
});

function downloadDataURL(dataURL, filename) {
  const a = document.createElement('a');
  a.href = dataURL;
  a.download = filename;
  a.click();
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// ---- Keyboard shortcuts ----
document.addEventListener('keydown', (e) => {
  if (!videoLoaded) return;
  switch (e.key) {
    case 'ArrowLeft':
      e.preventDefault();
      seekAndShow(Math.max(0, videoEl.currentTime - 1/estimatedFps));
      break;
    case 'ArrowRight':
      e.preventDefault();
      seekAndShow(Math.min(videoDuration, videoEl.currentTime + 1/estimatedFps));
      break;
    case ' ':
      e.preventDefault();
      if (videoEl.paused) videoEl.play(); else videoEl.pause();
      break;
  }
});
</script>
